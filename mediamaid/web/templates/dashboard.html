{% extends "base.html" %}
{% block content %}
<h1>仪表盘</h1>

<section class="cards">
  {% for label, key in [('已整理','done'), ('跳过','skipped'), ('失败','failed')] %}
  <div class="card">
    <div class="num">{{ counts.get(key, 0) }}</div>
    <div class="lbl">{{ label }}</div>
  </div>
  {% endfor %}
</section>

<section class="actions">
  <button onclick="doScan(true)">扫描预览 (dry-run)</button>
  <button onclick="doScan(false)" class="primary">执行扫描整理</button>
  <button onclick="doSubscribe()">运行订阅一轮</button>
  <span id="spinner" class="hidden">⏳ 处理中…</span>
</section>

<pre id="result" class="result hidden"></pre>

<h2>最近记录</h2>
{% include "_records_table.html" %}

<script>
const $ = (s) => document.querySelector(s);
function show(obj) {
  const el = $('#result');
  el.classList.remove('hidden');
  el.textContent = JSON.stringify(obj, null, 2);
}
async function post(url, body) {
  $('#spinner').classList.remove('hidden');
  try {
    const r = await fetch(url, {method: 'POST', body});
    const data = await r.json();
    show(data);
  } catch (e) {
    show({error: String(e)});
  } finally {
    $('#spinner').classList.add('hidden');
  }
}
function doScan(dry) {
  const fd = new FormData();
  fd.append('dry_run', dry ? 'true' : 'false');
  post('/api/scan', fd);
}
function doSubscribe() { post('/api/subscribe', new FormData()); }
</script>
{% endblock %}
