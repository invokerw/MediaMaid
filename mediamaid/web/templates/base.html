<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MediaMaid{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="brand">🎬 MediaMaid</div>
    <nav>
      <a href="/" class="{% if active=='dashboard' %}on{% endif %}">仪表盘</a>
      <a href="/records" class="{% if active=='records' %}on{% endif %}">记录</a>
      <a href="/plugins" class="{% if active=='plugins' %}on{% endif %}">插件</a>
      <a href="/config" class="{% if active=='config' %}on{% endif %}">配置</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
