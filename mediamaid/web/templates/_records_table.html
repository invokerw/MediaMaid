<table class="grid">
  <thead>
    <tr><th>ID</th><th>状态</th><th>动作</th><th>源文件</th><th>目标</th></tr>
  </thead>
  <tbody>
    {% for r in records %}
    <tr>
      <td>{{ r.id }}</td>
      <td><span class="badge {{ r.status }}">{{ r.status }}</span></td>
      <td>{{ r.action or '-' }}</td>
      <td class="mono">{{ r.src_path.split('/')[-1] }}</td>
      <td class="mono">{{ (r.dst_path.split('/')[-1]) if r.dst_path else '-' }}</td>
    </tr>
    {% else %}
    <tr><td colspan="5" class="empty">暂无记录</td></tr>
    {% endfor %}
  </tbody>
</table>
