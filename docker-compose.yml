# ============================================================================
# MediaMaid + qBittorrent 一体化部署示例
#
# 闭环：qBittorrent 下载完成 → 文件落到共享的 /data/downloads → MediaMaid 监控并
#       识别/刮削/整理(硬链接) 到 /data/media → Jellyfin/Plex/Emby 直接识别。
#
# ── 使用步骤 ────────────────────────────────────────────────────────────────
# 1) 改下面的 ★宿主目录★：把存放「下载」和「媒体库」的同一个宿主目录挂到两个
#    容器的 /data（务必同一个，且同一块盘，硬链接才生效，省双倍空间）。
# 2) 准备配置：
#       mkdir -p config
#       cp config/config.example.yaml config/config.yaml   # 见仓库 config/ 目录
#    编辑 config.yaml 填好 TMDB api_key（必填）。下载器已按本文件预设好，无需改。
# 3) 启动：docker compose up -d
# 4) 打开：
#       MediaMaid Web  →  http://<宿主IP>:8500   （登录见下方 MEDIAMAID_USERNAME/PASSWORD）
#       qBittorrent UI →  http://<宿主IP>:8080   （首次默认 admin / adminadmin，登录后改密码）
#    注意：改了 qB 密码后，要同步改 config.yaml 里 downloader.qbittorrent.password。
# 5) 在 qB 里添加种子并指定保存路径为 /data/downloads（compose 已设默认保存目录），
#    下载完成后 MediaMaid 会自动整理。也可在 MediaMaid「订阅」页配 RSS 自动追番/追剧。
# ============================================================================

services:
  mediamaid:
    # 用预构建镜像（推荐）。也可改成 build: . 本地构建。
    image: ghcr.io/invokerw/mediamaid:latest
    # build: .
    container_name: mediamaid
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=Asia/Shanghai
      # Web 登录账号：设了就优先于 config.yaml，且 UI 内不可改。务必改掉默认密码！
      - MEDIAMAID_USERNAME=admin
      - MEDIAMAID_PASSWORD=changeme
    ports:
      - "8500:8500"                 # MediaMaid Web 管理界面
    volumes:
      - ./config:/config            # 配置与状态库（config.yaml 放这里）
      - /srv/media:/data            # ★宿主目录★：内含 downloads/ 与 media/，与 qB 完全一致
    # 默认跑 Web（含手动扫描/订阅/管理）。要全自动闭环守护可换成：
    #   command: ["run", "-c", "/config/config.yaml"]
    command: ["web", "-c", "/config/config.yaml", "--host", "0.0.0.0", "--port", "8500"]

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000                   # 改成 `id -u` 的值，避免文件权限问题
      - PGID=1000                   # 改成 `id -g` 的值
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"                 # qB Web UI
      - "6881:6881"                 # BT 监听端口
      - "6881:6881/udp"
    volumes:
      - ./qb-config:/config         # qB 自身配置
      # ★必须与 MediaMaid 用完全相同的宿主→容器映射★，两边路径一致 → 无需 path_mappings，
      # 且与媒体库同盘可硬链接。下载请保存到 /data/downloads。
      - /srv/media:/data
