# MediaMaid 配置示例。复制为 config.yaml 后按需修改。

# 监控/扫描的源目录（可多个），例如下载完成目录
source_dirs:
  - /data/downloads

# 媒体库根目录
library_dir: /data/media

# 落地方式: hardlink（默认，跨盘自动回退复制） / copy / move
action: hardlink

# 目标已存在时: skip / overwrite / rename
on_conflict: skip

# 守护进程：文件大小连续 N 秒不变才认为写入完成
stable_seconds: 30

# 守护进程：兜底全量重扫间隔（秒），0 关闭
rescan_interval: 600

# 闭环守护 (mediamaid run) 相关：
subscribe_interval: 600   # 订阅轮询间隔（秒）
poll_completed: false     # 是否轮询下载器已完成任务并主动整理
poll_interval: 300        # 下载完成轮询间隔（秒）

# 状态库路径（SQLite）
state_db: mediamaid.db

# 全量扫描并发度：>1 时并行处理（瓶颈在 TMDB 网络请求）。注意 TMDB 速率限制。
scan_workers: 4

filters:
  video_extensions: [mkv, mp4, avi, ts, m2ts, mov, wmv, flv, iso]
  min_size_mb: 50
  exclude_keywords: [sample, trailer, 预告]

naming:
  # 可用占位符: {title} {show} {year} {season} {episode} {episode_title} {ext}
  movie: "Movies/{title} ({year})/{title} ({year}).{ext}"
  movie_no_year: "Movies/{title}/{title}.{ext}"
  episode: "TV/{show} ({year})/Season {season:02d}/{show} - S{season:02d}E{episode:02d}.{ext}"
  episode_no_year: "TV/{show}/Season {season:02d}/{show} - S{season:02d}E{episode:02d}.{ext}"
  anime: "Anime/{show} ({year})/Season {season:02d}/{show} - S{season:02d}E{episode:02d}.{ext}"
  anime_no_year: "Anime/{show}/Season {season:02d}/{show} - S{season:02d}E{episode:02d}.{ext}"

# 后处理（非某个插件专属）
write_nfo: false
download_artwork: false

# 动漫归类：源文件路径命中任一关键词的剧集归入 Anime/ 目录
# （建议把动漫订阅下载到名含 anime 的子目录，或填字幕组名）
anime_keywords: []   # 如 [anime, 动漫]

# 插件配置：类别 -> 该类别启用的插件实例列表。
# 用 `mediamaid plugins` 查看全部可用插件。
plugins:
  scraper:
    - name: tmdb
      enabled: true
      config:
        # 在 https://www.themoviedb.org/settings/api 申请
        api_key: ""
        language: zh-CN
        min_confidence: 0.5
        # 搜索结果进程内缓存（可选）：容量上限与存活秒数
        # cache_max: 512
        # cache_ttl: 3600
  notifier:
    - name: log          # 写日志，零依赖
    # - name: webhook
    #   config: {url: "https://example.com/hook"}
  # 以下需要 pip install 'mediamaid[plugins]'
  # subscriber:
  #   - name: rss
  #     config: {url: "https://example.com/rss", filter_keyword: 1080p}
  # downloader:
